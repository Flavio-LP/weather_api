services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bundle install &&
               bundle exec rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      RAILS_ENV: development
      RAILS_LOG_LEVEL: debug
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      bash -c "bundle install && bundle exec sidekiq"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    env_file:
      - .env
    environment:
      RAILS_ENV: development
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  whatsapp:
    build:
      context: ./whatsapp_service
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - .env
    environment:
      - PORT=3001
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth

volumes:
  bundle_cache:
  redis_data:
  whatsapp_auth:
