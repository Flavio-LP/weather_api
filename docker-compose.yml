services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: >
      bash -c "rm -f tmp/pids/server.pid &&
               bundle install &&
               bundle exec rails server -b 0.0.0.0 -p 3000"
    volumes:
      - .:/rails
      - bundle_cache:/usr/local/bundle
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      RAILS_ENV: development
      RAILS_LOG_LEVEL: debug

volumes:
  bundle_cache:
