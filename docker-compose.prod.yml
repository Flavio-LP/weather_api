services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      RAILS_LOG_LEVEL: info
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  sidekiq:
    build:
      context: .
      dockerfile: Dockerfile
    command: bundle exec sidekiq
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      RAILS_LOG_LEVEL: info
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  whatsapp:
    build:
      context: ./whatsapp_service
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - whatsapp_auth:/app/.wwebjs_auth

volumes:
  redis_data:
  whatsapp_auth:
